# These rules were previously evaluated inside each per-cluster Prometheus instance.
# After migration to Prometheus agent mode, per-cluster agents push raw metrics to
# the seed Prometheus via remote_write. All metrics carry 'cluster' and 'seed_cluster'
# external labels, so rules can be evaluated centrally here.
#
# Key differences from the per-cluster versions:
#   - Recording rules aggregate by (cluster, ...) to preserve per-cluster identity.
#   - absent() alerts are replaced: at seed level, absent() only fires when NO cluster
#     has the component. Instead, we cross-join with kube-state-metrics as a liveness
#     anchor ("cluster is actively monitored") to detect per-cluster absences.
#   - Konnectivity and Envoy rules are no longer conditional: metrics are only present
#     for clusters using those features, so the rules naturally scope themselves.

groups:
  - name: kubermatic.goprocess
    rules:
      - record: job:process_resident_memory_bytes:clone
        expr: process_resident_memory_bytes

      - record: job:process_cpu_seconds_total:rate5m
        expr: rate(process_cpu_seconds_total[5m])

      - record: job:process_open_fds:clone
        expr: process_open_fds

  - name: kubermatic.etcd
    rules:
      - alert: EtcdInsufficientMembers
        annotations:
          message: 'Etcd cluster "{{ $labels.job }}" in cluster {{ $labels.cluster }}: insufficient members ({{ $value }}).'
        expr: |
          sum by (cluster, job) (up{job="etcd"} == bool 1)
          < ((count by (cluster, job) (up{job="etcd"}) + 1) / 2)
        for: 15m
        labels:
          severity: critical

      - alert: EtcdNoLeader
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: member {{ $labels.instance }} has no leader.'
        expr: |
          etcd_server_has_leader{job="etcd"} == 0
        for: 15m
        labels:
          severity: critical

      - alert: EtcdHighNumberOfLeaderChanges
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: instance {{ $labels.instance }} has seen {{ $value }} leader changes within the last 15 minutes.'
        expr: |
          rate(etcd_server_leader_changes_seen_total{job="etcd"}[15m]) > 3
        for: 15m
        labels:
          severity: warning

      - alert: EtcdGRPCRequestsSlow
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: gRPC requests to {{ $labels.grpc_method }} are taking {{ $value }}s on etcd instance {{ $labels.instance }}.'
        expr: |
          histogram_quantile(0.99,
            sum by (cluster, job, instance, grpc_service, grpc_method, le) (
              rate(grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary"}[5m])
            )
          ) > 0.15
        for: 10m
        labels:
          severity: critical

      - alert: EtcdMemberCommunicationSlow
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: member communication with {{ $labels.To }} is taking {{ $value }}s on etcd instance {{ $labels.instance }}.'
        expr: |
          histogram_quantile(0.99,
            rate(etcd_network_peer_round_trip_time_seconds_bucket{job="etcd"}[5m])
          ) > 0.15
        for: 10m
        labels:
          severity: warning

      - alert: EtcdHighNumberOfFailedProposals
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: {{ $value }} proposal failures within the last 15 minutes on etcd instance {{ $labels.instance }}.'
        expr: |
          rate(etcd_server_proposals_failed_total{job="etcd"}[15m]) > 5
        for: 15m
        labels:
          severity: warning

      - alert: EtcdHighFsyncDurations
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: 99th percentile fsync durations are {{ $value }}s on etcd instance {{ $labels.instance }}.'
        expr: |
          histogram_quantile(0.99,
            rate(etcd_disk_wal_fsync_duration_seconds_bucket{job="etcd"}[5m])
          ) > 0.5
        for: 10m
        labels:
          severity: warning

      - alert: EtcdHighCommitDurations
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: 99th percentile commit durations {{ $value }}s on etcd instance {{ $labels.instance }}.'
        expr: |
          histogram_quantile(0.99,
            rate(etcd_disk_backend_commit_duration_seconds_bucket{job="etcd"}[5m])
          ) > 0.25
        for: 10m
        labels:
          severity: warning

      - alert: EtcdDatabaseQuotaLowSpace
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: database size exceeds the defined quota on etcd instance {{ $labels.instance }}, please defrag or increase the quota as writes will be disabled when it is full.'
        expr: |
          (last_over_time(etcd_mvcc_db_total_size_in_bytes[5m]) / last_over_time(etcd_server_quota_backend_bytes[5m])) * 100 > 95
        for: 10m
        labels:
          severity: critical

      - alert: EtcdExcessiveDatabaseGrowth
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: predicting running out of disk space in the next four hours on etcd instance {{ $labels.instance }}.'
        expr: |
          predict_linear(etcd_mvcc_db_total_size_in_bytes[4h], 4 * 60 * 60) > etcd_server_quota_backend_bytes
        for: 10m
        labels:
          severity: warning

      - alert: EtcdDatabaseHighFragmentationRatio
        annotations:
          message: 'Etcd in cluster {{ $labels.cluster }}: database size in use on instance {{ $labels.instance }} is {{ $value | humanizePercentage }} of the actual allocated disk space, please run defragmentation (e.g. etcdctl defrag) to retrieve the unused fragmented disk space.'
        expr: |
          (last_over_time(etcd_mvcc_db_total_size_in_use_in_bytes[5m]) / last_over_time(etcd_mvcc_db_total_size_in_bytes[5m])) < 0.5
          and etcd_mvcc_db_total_size_in_use_in_bytes > 104857600
        for: 10m
        labels:
          severity: warning

      - record: job:etcd_server_has_leader:sum
        expr: sum by (cluster) (etcd_server_has_leader)

      - record: job:etcd_disk_wal_fsync_duration_seconds_bucket:99percentile
        expr: |
          histogram_quantile(0.99,
            sum by (cluster, instance, le) (rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m]))
          )

      - record: job:etcd_disk_backend_commit_duration_seconds_bucket:99percentile
        expr: |
          histogram_quantile(0.99,
            sum by (cluster, instance, le) (rate(etcd_disk_backend_commit_duration_seconds_bucket[5m]))
          )

      - record: job:etcd_mvcc_db_total_size_in_bytes:clone
        expr: etcd_mvcc_db_total_size_in_bytes

      - record: job:etcd_network_client_grpc_received_bytes_total:rate5m
        expr: rate(etcd_network_client_grpc_received_bytes_total[5m])

      - record: job:etcd_network_client_grpc_sent_bytes_total:rate5m
        expr: rate(etcd_network_client_grpc_sent_bytes_total[5m])

      - record: job:etcd_network_peer_received_bytes_total:rate5msum
        expr: sum by (cluster, instance) (rate(etcd_network_peer_received_bytes_total[5m]))

      - record: job:etcd_network_peer_sent_bytes_total:rate5msum
        expr: sum by (cluster, instance) (rate(etcd_network_peer_sent_bytes_total[5m]))

      - record: job:etcd_server_proposals_failed_total:rate5msum
        expr: sum by (cluster) (rate(etcd_server_proposals_failed_total[5m]))

      - record: job:etcd_server_proposals_pending:sum
        expr: sum by (cluster) (etcd_server_proposals_pending)

      - record: job:etcd_server_proposals_committed_total:rate5msum
        expr: sum by (cluster) (rate(etcd_server_proposals_committed_total[5m]))

      - record: job:etcd_server_proposals_applied_total:rate5msum
        expr: sum by (cluster) (rate(etcd_server_proposals_applied_total[5m]))

      - record: job:etcd_server_leader_changes_seen_total:changes1d
        expr: changes(etcd_server_leader_changes_seen_total[1d])

      - record: job:etcd_mvcc_delete_total:rate5m
        expr: rate(etcd_mvcc_delete_total[5m])

      - record: job:etcd_mvcc_put_total:rate5m
        expr: rate(etcd_mvcc_put_total[5m])

      - record: job:etcd_mvcc_range_total:rate5m
        expr: rate(etcd_mvcc_range_total[5m])

      - record: job:etcd_debugging_mvcc_watcher_total:rate5m
        expr: rate(etcd_debugging_mvcc_watcher_total[5m])

      - record: job:etcd_mvcc_txn_total:rate5m
        expr: rate(etcd_mvcc_txn_total[5m])

      - record: job:etcd_debugging_mvcc_keys_total:clone
        expr: etcd_debugging_mvcc_keys_total

      - record: job:etcd_debugging_store_reads_total:rate5m
        expr: rate(etcd_debugging_store_reads_total[5m])

      - record: job:etcd_debugging_store_writes_total:rate5m
        expr: rate(etcd_debugging_store_writes_total[5m])

      - record: job:etcd_debugging_store_expires_total:rate5m
        expr: rate(etcd_debugging_store_expires_total[5m])

      - record: job:apiserver_storage_size_bytes:sum
        expr: sum by (cluster) (apiserver_storage_size_bytes)

  - name: machine-controller
    rules:
      - alert: MachineControllerTooManyErrors
        annotations:
          message: Machine Controller in cluster {{ $labels.cluster }} has too many errors in its loop.
        expr: |
          sum by (cluster, namespace) (rate(machine_controller_errors_total[5m])) > 0.01
        for: 20m
        labels:
          severity: warning

      - alert: MachineControllerMachineDeletionTakesTooLong
        annotations:
          message: Machine {{ $labels.machine }} of cluster {{ $labels.cluster }} is stuck in deletion for more than 30min.
        expr: (time() - machine_controller_machine_deleted) > 30 * 60
        for: 0m
        labels:
          severity: warning

      - alert: AWSInstanceCountTooHigh
        annotations:
          message: '{{ $labels.machine }} in cluster {{ $labels.cluster }} has more than one instance at AWS'
        expr: machine_controller_aws_instances_for_machine > 1
        for: 30m
        labels:
          severity: warning

      - alert: KubernetesAdmissionWebhookHighRejectionRate
        annotations:
          message: '{{ $labels.operation }} requests for Machine objects in cluster {{ $labels.cluster }} are failing (Admission) with a high rate. Consider checking the affected objects'
        expr: |
          rate(apiserver_admission_webhook_admission_latencies_seconds_count{name="machine-controller.kubermatic.io-machines", rejected="true"}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning

      - record: job:machine_controller_errors_total:rate5m
        expr: rate(machine_controller_errors_total[5m])

      - record: job:machine_controller_workers:sum
        expr: sum by (cluster) (machine_controller_workers)

      - record: job:machine_controller_machines_total:sum
        expr: sum by (cluster, kubelet_version, os, provider, size) (machine_controller_machines_total)

      - record: job:machine_deployment_available_replicas:user:sum
        expr: sum by (cluster, name, namespace) (machine_deployment_available_replicas)

      - record: job:machine_deployment_ready_replicas:user:sum
        expr: sum by (cluster, name, namespace) (machine_deployment_ready_replicas)

      - record: job:machine_deployment_replicas:user:sum
        expr: sum by (cluster, name, namespace) (machine_deployment_replicas)

      - record: job:machine_deployment_updated_replicas:user:sum
        expr: sum by (cluster, name, namespace) (machine_deployment_updated_replicas)

  - name: process.filedescriptors
    rules:
      - record: instance:fd_utilization
        expr: process_open_fds / process_max_fds

      - alert: FdExhaustionClose
        annotations:
          message: '{{ $labels.job }} instance {{ $labels.instance }} in cluster {{ $labels.cluster }} will exhaust its file descriptors soon'
        expr: |
          predict_linear(instance:fd_utilization[1h], 3600 * 4) > 1
        for: 10m
        labels:
          severity: warning

      - alert: FdExhaustionClose
        annotations:
          message: '{{ $labels.job }} instance {{ $labels.instance }} in cluster {{ $labels.cluster }} will exhaust its file descriptors soon'
        expr: |
          predict_linear(instance:fd_utilization[10m], 3600) > 1
        for: 10m
        labels:
          severity: critical

  - name: kubernetes-nodes
    rules:
      - alert: KubernetesNodeNotReady
        annotations:
          message: '{{ $labels.node }} in cluster {{ $labels.cluster }} has been unready for more than 30 minutes.'
        expr: kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 30m
        labels:
          severity: warning

      - record: job:kube_node_info:count
        expr: count by (cluster) (kube_node_info)

  - name: kubernetes-absent
    # absent() cannot be used at seed level for per-cluster detection: it only fires
    # when the metric is absent across ALL clusters simultaneously. Instead, we use
    # kube-state-metrics as a liveness anchor — if a cluster is sending kube-state-metrics
    # it is actively monitored, and we can detect missing components via set subtraction.
    rules:
      - alert: KubernetesApiserverDown
        annotations:
          message: Kubernetes apiserver has disappeared from Prometheus target discovery in cluster {{ $labels.cluster }}.
        expr: |
          count by (cluster) (up{job="kube-state-metrics"})
          unless
          count by (cluster) (up{job="apiserver"} == 1)
        for: 15m
        labels:
          severity: critical

      - alert: MachineControllerDown
        annotations:
          message: Machine controller has disappeared from Prometheus target discovery in cluster {{ $labels.cluster }}.
        expr: |
          count by (cluster) (up{job="kube-state-metrics"})
          unless
          count by (cluster) (up{job="machine-controller"} == 1)
        for: 15m
        labels:
          severity: critical

      - alert: UserClusterControllerDown
        annotations:
          message: User Cluster Controller has disappeared from Prometheus target discovery in cluster {{ $labels.cluster }}.
        expr: |
          count by (cluster) (up{job="kube-state-metrics"})
          unless
          count by (cluster) (up{job="usercluster-controller"} == 1)
        for: 15m
        labels:
          severity: critical

      - alert: KubeStateMetricsDown
        annotations:
          message: Kube-state-metrics has disappeared from Prometheus target discovery in cluster {{ $labels.cluster }}.
        expr: |
          count by (cluster) (up{job="etcd"})
          unless
          count by (cluster) (up{job="kube-state-metrics"} == 1)
        for: 15m
        labels:
          severity: warning

      - alert: EtcdDown
        annotations:
          message: Etcd has disappeared from Prometheus target discovery in cluster {{ $labels.cluster }}.
        expr: |
          count by (cluster) (up{job="kube-state-metrics"})
          unless
          count by (cluster) (up{job="etcd"} == 1)
        for: 15m
        labels:
          severity: critical

      # Fires when cadvisor is being scraped (target present) but is failing.
      # An absent() would be incorrect: clusters with no nodes have no cadvisors.
      - alert: CAdvisorDown
        annotations:
          message: cAdvisor on {{ $labels.kubernetes_io_hostname }} in cluster {{ $labels.cluster }} could not be scraped.
        expr: up{job="cadvisor"} == 0
        for: 15m
        labels:
          severity: warning

      # Fires when kubelet is being scraped (target present) but is failing.
      - alert: KubernetesNodeDown
        annotations:
          message: The kubelet on {{ $labels.kubernetes_io_hostname }} in cluster {{ $labels.cluster }} could not be scraped.
        expr: up{job="nodes"} == 0
        for: 15m
        labels:
          severity: warning

      # DNSResolverDown only applies to clusters NOT using Konnectivity.
      # Konnectivity clusters legitimately have no dns-resolver targets, so we cannot
      # use the kube-state-metrics anchor here. Instead, fire only when targets exist
      # but are failing. Disappearance of all targets is covered by the etcd/apiserver alerts.
      - alert: DNSResolverDown
        annotations:
          message: DNS resolver has disappeared from Prometheus target discovery in cluster {{ $labels.cluster }}.
        expr: up{job="dns-resolver"} == 0
        for: 15m
        labels:
          severity: warning

  # Konnectivity rules: only active for clusters using the Konnectivity expose strategy.
  # No conditional is needed — konnectivity metrics are only scraped from clusters that
  # run a Konnectivity server, so rules simply produce no output for other clusters.
  - name: kubermatic.konnectivity
    rules:
      - record: job:konnectivity_ready_backend_connections:count
        expr: konnectivity_network_proxy_server_ready_backend_connections

      - record: job:konnectivity_dial_failure_rate:by_reason
        expr: sum by (cluster, reason) (rate(konnectivity_network_proxy_server_dial_failure_count[5m]))

      - record: job:konnectivity_network_proxy_server_full_receive_channels:sum
        expr: sum by (cluster) (konnectivity_network_proxy_server_full_receive_channels)

      - alert: KonnectivityNoAgents
        annotations:
          message: 'Cluster {{ $labels.cluster }} has no Konnectivity agents connected. New tunnels cannot be established.'
        expr: |
          job:konnectivity_ready_backend_connections:count == 0
        for: 2m
        labels:
          severity: critical

      - alert: KonnectivityAgentsUnhealthy
        annotations:
          message: 'Cluster {{ $labels.cluster }} has only {{ $value }} Konnectivity agent(s) connected (expected: 2).'
        expr: |
          job:konnectivity_ready_backend_connections:count < 2
        for: 3m
        labels:
          severity: warning

      - alert: KonnectivityHighDialFailureRate
        annotations:
          message: 'Cluster {{ $labels.cluster }} has {{ $value | humanize }} dial failures/sec (reason: {{ $labels.reason }}). Check agent and node health.'
        expr: |
          job:konnectivity_dial_failure_rate:by_reason > 0.1
        for: 10m
        labels:
          severity: warning

  # Envoy agent rules: only active for clusters using the Tunneling expose strategy.
  # Same as Konnectivity — no conditional needed, metrics are only present for
  # clusters running envoy-agent.
  - name: kubermatic.envoy
    rules:
      - record: job:envoy_cluster_upstream_cx_active:sum
        expr: sum by (cluster) (envoy_cluster_upstream_cx_active)

      - record: job:envoy_cluster_upstream_rq_total:irate1msum
        expr: sum by (cluster, envoy_cluster_name) (irate(envoy_cluster_upstream_rq_total[1m]))

      - record: job:envoy_cluster_upstream_cx_rx_bytes_total:irate1msum
        expr: sum by (cluster, envoy_cluster_name) (irate(envoy_cluster_upstream_cx_rx_bytes_total[1m]))

      - record: job:envoy_cluster_upstream_cx_tx_bytes_total:irate1msum
        expr: sum by (cluster, envoy_cluster_name) (irate(envoy_cluster_upstream_cx_tx_bytes_total[1m]))

      - record: job:envoy_cluster_upstream_rq_time_bucket:rate1msum
        expr: sum by (cluster, le, envoy_cluster_name) (rate(envoy_cluster_upstream_rq_time_bucket[1m]))
