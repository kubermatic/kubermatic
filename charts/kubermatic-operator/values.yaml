# Gateway API is the default and only supported ingress path as of KKP 2.31, so the
# kubermatic-operator always runs with the "--enable-gateway-api" flag (watching and managing
# Gateway and HTTPRoute resources). This value is deprecated and retained as a no-op for
# backwards compatibility.
migrateGatewayAPI: true

kubermaticOperator:
  image:
    repository: "quay.io/kubermatic/kubermatic"
    # this field gets updated by set_helm_charts_version() during
    # a release prowjob
    tag: "v9.9.9-dev"

  # Namespaces to watch for HTTPRoutes when Gateway API is enabled.
  # Only used when migrateGatewayAPI=true and HTTPRouteGatewaySync feature gate is enabled.
  # Default: ["monitoring", "mla"]
  httpRouteWatchNamespaces:
    - monitoring
    - mla

  imagePullSecret: |
    {
      "quay.io": {}
    }

  # imagePullSecretExistingSecret optionally points the operator at a pre-created image
  # pull Secret instead of generating the "dockercfg" Secret from imagePullSecret above.
  # When set, the chart skips creating that Secret; the referenced Secret must live in
  # the operator's namespace, be of type kubernetes.io/dockerconfigjson, and contain the
  # key ".dockerconfigjson".
  imagePullSecretExistingSecret: ""

  debug: false
  leaderElection: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Additional environment variables to pass to the kubermatic-operator pod.
  extraEnv: []
  # - name: KEY
  #   value: 'value'

  # Node scheduling configuration
  tolerations: []
  # Example:
  # - key: "node-role.kubernetes.io/control-plane"
  #   operator: "Exists"
  #   effect: "NoSchedule"

  affinity: {}
  # Example:
  # nodeAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #   - weight: 100
  #     preference:
  #       matchExpressions:
  #       - key: node-role.kubernetes.io/control-plane
  #         operator: Exists

  nodeSelector: {}
  # Example:
  # kubernetes.io/os: linux
  # node-role.kubernetes.io/control-plane: ""
