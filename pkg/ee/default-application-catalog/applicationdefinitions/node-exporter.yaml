---
apiVersion: apps.kubermatic.k8c.io/v1
kind: ApplicationDefinition
metadata:
  name: node-exporter
spec:
  description: node exporter application
  method: helm
  versions:
  - version: 1.10.2
    template:
      source:
        helm:
          chartName: prometheus-node-exporter
          chartVersion: 4.51.0
          url: oci://quay.io/kubermatic-mirror/helm-charts
  defaultValuesBlock: |
    # node-exporter must survive node drain/eviction to keep collecting until the node goes down
    tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists

    resources:
      limits:
        cpu: 25m
        memory: 48Mi
      requests:
        cpu: 10m
        memory: 24Mi

    extraManifests:
      - |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: monitoring-scraping-node-exporter
          namespace: mla-system
        data:
          custom-scrape-configs.yaml: |+
            - job_name: 'node-exporter'
              kubernetes_sd_configs:
              - role: endpoints # 'endpoints' works better for annotation-based discovery
              relabel_configs:
              # 1. Only scrape services with the 'prometheus.io/scrape: true' annotation
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              # 2. Filter for your specific node-exporter app
              - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
                action: keep
                regex: prometheus-node-exporter
              # 3. Handle the scheme (http vs https) from annotations
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
                action: replace
                target_label: __scheme__
                regex: (https?)
              # 4. Handle the custom path if specified (default is /metrics)
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              # 5. Extract the node name so you know which server is which
              - source_labels: [__meta_kubernetes_endpoint_node_name]
                action: replace
                target_label: node_name
              # 6. Hardcode the job label to "node-exporter"
              - action: replace
                target_label: job
                replacement: node-exporter
