---
apiVersion: apps.kubermatic.k8c.io/v1
kind: ApplicationDefinition
metadata:
  name: kube-state-metrics
spec:
  description: kube-state-metrics application
  method: helm
  versions:
  - version: 2.18.0
    template:
      source:
        helm:
          chartName: kube-state-metrics
          chartVersion: 7.2.0
          url: https://prometheus-community.github.io/helm-charts
  defaultValuesBlock: |
    resources:
      limits:
        cpu: 100m
        memory: 600Mi
      requests:
        cpu: 10m
        memory: 190Mi

    podDisruptionBudget:
      maxUnavailable: 1

    extraManifests:
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: monitoring-scraping-kube-state-metrics
          namespace: mla-system
        data:
          custom-scrape-configs.yaml: |+
            - job_name: 'kube-state-metrics'
              kubernetes_sd_configs:
                - role: endpoints # 'endpoints' works better for annotation-based discovery
              relabel_configs:
                # 1. Only scrape services with the 'prometheus.io/scrape: true' annotation
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                # 2. Filter for your specific kube-state-metrics app
                - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
                  action: keep
                  regex: kube-state-metrics
                # 3. Handle the scheme (http vs https) from annotations
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
                  action: replace
                  target_label: __scheme__
                  regex: (https?)
                # 4. Handle the custom path if specified (default is /metrics)
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                # 5. Hardcode the job label to "kube-state-metrics"
                - action: replace
                  target_label: job
                  replacement: kube-state-metrics
