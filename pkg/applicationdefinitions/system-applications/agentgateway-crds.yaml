apiVersion: apps.kubermatic.k8c.io/v1
kind: ApplicationDefinition
metadata:
  name: agentgateway-crds
  labels:
    apps.kubermatic.k8c.io/managed-by: kkp
spec:
  description: AgentGateway custom resource definitions for configuring AI, MCP, and API gateway backends and policies.
  displayName: AgentGateway CRDs
  defaultNamespace:
    name: agentgateway-system
    create: true
  method: helm
  versions:
    - template:
        source:
          helm:
            chartName: agentgateway-crds
            chartVersion: 1.3.1
            url: oci://quay.io/kubermatic-mirror/helm-charts
      version: 1.3.1
  documentationURL: https://agentgateway.dev/docs/kubernetes/latest/
  sourceURL: https://github.com/agentgateway/agentgateway
