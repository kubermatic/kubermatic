name: Test Conformance EE Token

on:
  pull_request:
    branches:
      - main

jobs:
  test-token:
    runs-on: ubuntu-latest
    steps:
      - name: List open issues in conformance-ee
        env:
          GH_TOKEN: ${{ secrets.KUBERMATIC_CONFORMANCE_EE_GH_TOKEN }}
        run: |
          echo "=== Open Issues ==="
          gh issue list --repo "kubermatic/conformance-ee" --state open --limit 10

      - name: List open PRs in conformance-ee
        env:
          GH_TOKEN: ${{ secrets.KUBERMATIC_CONFORMANCE_EE_GH_TOKEN }}
        run: |
          echo "=== Open Pull Requests ==="
          gh pr list --repo "kubermatic/conformance-ee" --state open --limit 10
